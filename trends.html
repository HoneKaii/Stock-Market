<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Draw Trends</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>📉 Live Draw Trends</h1>
      <p class="subtle">Live plotted trend line for tracked symbols using Finnhub quotes.</p>
      <a href="index.html" class="button-link">← Back to Dashboard</a>
    </header>

    <main class="trend-page">
      <section class="card">
        <div class="trend-controls">
          <label for="trend-symbol" class="subtle">Symbol:</label>
          <select id="trend-symbol"></select>
          <button id="trend-start-btn" type="button">Start Live Draw</button>
          <button id="trend-stop-btn" type="button" class="secondary">Stop</button>
          <button id="trend-clear-btn" type="button" class="secondary">Clear</button>
          <a id="trend-google-link" class="button-link" target="_blank" rel="noreferrer">Google Finance</a>
        </div>

        <div class="trend-canvas-wrap">
          <canvas id="trend-canvas" width="1000" height="340"></canvas>
        </div>

        <p id="trend-status" class="subtle">Waiting to start live draw…</p>
      </section>
    </main>

    <script src="trends.js"></script>
  </body>
</html>
